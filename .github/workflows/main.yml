name: Auto Preprocessing Pipeline

on:
  push:
    branches:
      - main
    paths:
      - 'iris_raw/**'
      - 'preprocessing/automate_JoshuaChristianBenedict.py'
  workflow_dispatch:  # Bisa dijalankan manual

jobs:
  preprocessing:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python 3.10
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pandas numpy scikit-learn

      - name: Run Preprocessing Script
        run: |
          python preprocessing/JoshuaChristianBenedict.py

      - name: Verify Output
        run: |
          echo "=== Verifikasi Output Preprocessing ==="
          ls -la preprocessing/iris_preprocessing/
          python -c "
          import pandas as pd
          df = pd.read_csv('preprocessing/iris_preprocessing/iris_preprocessing.csv')
          print(f'Shape: {df.shape}')
          print(f'Kolom: {df.columns.tolist()}')
          print(df.head())
          "

      - name: Commit and Push Preprocessed Data
        run: |
          git config --global user.email "actions@github.com"
          git config --global user.name "GitHub Actions Bot"
          git add preprocessing/iris_preprocessing/
          git diff --staged --quiet || git commit -m "ci: auto-update preprocessed dataset [skip ci]"
          git push
